<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HUBERT — Internship Workflow</title>
<style>
  /* ── Base ─────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07080f;
    --surface:   #0e1020;
    --border:    #1d2035;
    --accent:    #4f6ef7;
    --accent2:   #6c3dfa;
    --green:     #22d48c;
    --yellow:    #f0c048;
    --red:       #f04f5a;
    --text:      #e2e5f0;
    --muted:     #5a6080;
    --node-w:    160px;
    --node-h:    88px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
    user-select: none;
  }

  /* ── Layout ───────────────────────────────────────────────────────────── */
  #root {
    display: grid;
    grid-template-rows: 52px 1fr 220px;
    height: 100vh;
  }

  /* ── Header ───────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-sep { flex: 1; }
  #status-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--border);
    color: var(--muted);
    transition: all 0.4s ease;
  }
  #status-badge.running { border-color: var(--accent); color: var(--accent); background: rgba(79,110,247,0.12); }
  #status-badge.done    { border-color: var(--green);  color: var(--green);  background: rgba(34,212,140,0.12); }
  #status-badge.error   { border-color: var(--red);    color: var(--red);    background: rgba(240,79,90,0.12); }

  #timer {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  /* ── Canvas ───────────────────────────────────────────────────────────── */
  #canvas-wrap {
    position: relative;
    overflow: hidden;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(79,110,247,0.04) 0%, transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(108,61,250,0.04) 0%, transparent 60%);
  }
  svg#edges {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #nodes {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .node-row {
    display: flex;
    align-items: center;
    gap: 64px;
  }

  /* ── Node ─────────────────────────────────────────────────────────────── */
  .node {
    position: relative;
    width: var(--node-w);
    height: var(--node-h);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: default;
    transition: border-color 0.35s, box-shadow 0.35s, transform 0.2s;
  }
  .node:hover { transform: translateY(-2px); }

  .node.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 28px rgba(79,110,247,0.3);
    animation: pulse-border 1.6s ease-in-out infinite;
  }
  .node.done {
    border-color: var(--green);
    box-shadow: 0 0 16px rgba(34,212,140,0.18);
  }
  .node.error {
    border-color: var(--red);
    box-shadow: 0 0 16px rgba(240,79,90,0.2);
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 1px var(--accent), 0 0 28px rgba(79,110,247,0.3); }
    50%       { box-shadow: 0 0 0 2px var(--accent), 0 0 40px rgba(79,110,247,0.5); }
  }

  .node-icon { font-size: 24px; line-height: 1; }
  .node-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.35s;
  }
  .node.active .node-label { color: var(--text); }
  .node.done   .node-label { color: var(--green); }
  .node.error  .node-label { color: var(--red); }

  .node-count {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .node.active .node-count,
  .node.done   .node-count { opacity: 1; }

  .node-check {
    position: absolute;
    bottom: 7px;
    right: 10px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.4s;
    color: var(--green);
  }
  .node.done .node-check { opacity: 1; }

  /* ── SVG Edges ────────────────────────────────────────────────────────── */
  .edge {
    stroke: var(--border);
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 6 4;
    animation: dash-idle 3s linear infinite;
  }
  .edge.active {
    stroke: var(--accent);
    stroke-dasharray: 8 4;
    animation: dash-flow 0.8s linear infinite;
    filter: drop-shadow(0 0 4px rgba(79,110,247,0.6));
  }
  .edge.done {
    stroke: var(--green);
    stroke-dasharray: unset;
    animation: none;
  }
  @keyframes dash-idle { to { stroke-dashoffset: -20; } }
  @keyframes dash-flow { to { stroke-dashoffset: -24; } }

  /* ── Log Panel ────────────────────────────────────────────────────────── */
  #log-panel {
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #stats {
    display: flex;
    gap: 24px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat { display: flex; align-items: baseline; gap: 6px; }
  .stat-val {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .stat-val.pop { animation: pop 0.3s ease; }
  @keyframes pop {
    0%   { transform: scale(1);    color: var(--accent); }
    40%  { transform: scale(1.15); color: var(--accent); }
    100% { transform: scale(1);    color: var(--text); }
  }
  .stat-lbl { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

  #log-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #log-header span {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .log-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .log-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  #log-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #log-scroll::-webkit-scrollbar { width: 4px; }
  #log-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 2px 16px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.6;
    animation: slide-in 0.2s ease;
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-phase {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 1px 6px; border-radius: 3px;
    flex-shrink: 0; min-width: 52px; text-align: center;
  }
  .phase-search  { background: rgba(79,110,247,0.15); color: var(--accent); }
  .phase-filter  { background: rgba(240,192,72,0.15);  color: var(--yellow); }
  .phase-apply   { background: rgba(34,212,140,0.15);  color: var(--green); }
  .phase-record  { background: rgba(108,61,250,0.15);  color: #a78bfa; }
  .phase-storage { background: rgba(240,192,72,0.12);  color: var(--yellow); }
  .phase-start   { background: rgba(79,110,247,0.1);   color: var(--accent); }
  .phase-done    { background: rgba(34,212,140,0.2);   color: var(--green); }
  .phase-error   { background: rgba(240,79,90,0.15);   color: var(--red); }
  .log-msg { color: var(--text); }
</style>
</head>
<body>
<div id="root">

  <header>
    <div class="logo">HUBERT</div>
    <div style="font-size:11px;color:var(--muted);margin-left:4px">Internship Workflow</div>
    <div class="header-sep"></div>
    <div id="timer">00:00</div>
    <div id="status-badge">Idle</div>
  </header>

  <div id="canvas-wrap">
    <svg id="edges"></svg>
    <div id="nodes">
      <div class="node-row">
        <div class="node" id="node-search">
          <div class="node-icon">🔍</div>
          <div class="node-label">Search</div>
          <div class="node-count" id="cnt-search">0</div>
          <div class="node-check">✓</div>
        </div>
        <div class="node" id="node-filter">
          <div class="node-icon">⚡</div>
          <div class="node-label">Filter</div>
          <div class="node-count" id="cnt-filter">0</div>
          <div class="node-check">✓</div>
        </div>
        <div class="node" id="node-apply">
          <div class="node-icon">📋</div>
          <div class="node-label">Apply</div>
          <div class="node-count" id="cnt-apply">0</div>
          <div class="node-check">✓</div>
        </div>
        <div class="node" id="node-record">
          <div class="node-icon">📊</div>
          <div class="node-label">Record</div>
          <div class="node-count" id="cnt-record">0</div>
          <div class="node-check">✓</div>
        </div>
      </div>
    </div>
  </div>

  <div id="log-panel">
    <div id="stats">
      <div class="stat"><div class="stat-val" id="sv-found">0</div><div class="stat-lbl">Found</div></div>
      <div class="stat"><div class="stat-val" id="sv-new">0</div><div class="stat-lbl">New</div></div>
      <div class="stat"><div class="stat-val" id="sv-applied">0</div><div class="stat-lbl">Applied</div></div>
    </div>
    <div id="log-header">
      <div class="log-dot" id="live-dot"></div>
      <span>Live Log</span>
    </div>
    <div id="log-scroll"></div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const startTimes = {};
let startTime = null;

// ── WebSocket ──────────────────────────────────────────────────────────────
let ws = null;
let reconnectTimer = null;
const edgeStates = { 'search-filter': 'idle', 'filter-apply': 'idle', 'apply-record': 'idle' };

function connect() {
  ws = new WebSocket('ws://localhost:8877/ws');
  ws.onopen  = () => { document.getElementById('live-dot').classList.add('live'); addLog('start', 'Connected to HUBERT workflow engine.'); };
  ws.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch {} };
  ws.onclose = () => { document.getElementById('live-dot').classList.remove('live'); reconnectTimer = setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
}

function handleEvent(msg) {
  const { phase, message, count } = msg;
  if (phase === 'start') {
    startTime = Date.now();
    setStatus('running', 'Running');
    setNode('search', 'active');
    drawEdges();
  } else if (phase === 'search') {
    setNode('search', 'active');
    if (count > 0) { setCount('search', count); setStat('sv-found', count); }
  } else if (phase === 'filter') {
    setNode('search', 'done'); setNode('filter', 'active');
    setEdge('search-filter', 'done'); setEdge('filter-apply', 'active');
    if (count > 0) { setCount('filter', count); setStat('sv-new', count); }
  } else if (phase === 'apply') {
    setNode('filter', 'done'); setNode('apply', 'active');
    setEdge('filter-apply', 'done'); setEdge('apply-record', 'active');
    if (count > 0) { setCount('apply', count); setStat('sv-applied', count); }
  } else if (phase === 'record' || phase === 'storage') {
    if (phase === 'record') { setNode('apply', 'done'); setNode('record', 'active'); setEdge('apply-record', 'done'); }
    if (count > 0) setCount('record', count);
  } else if (phase === 'done') {
    setNode('record', 'done'); setStatus('done', 'Done');
    document.getElementById('live-dot').classList.remove('live');
  } else if (phase === 'error') {
    setStatus('error', 'Error');
    document.getElementById('live-dot').classList.remove('live');
  }
  addLog(phase, message);
}

function setNode(id, cls) {
  const el = document.getElementById('node-' + id);
  if (el) el.className = 'node ' + cls;
}

function setCount(id, val) {
  const el = document.getElementById('cnt-' + id);
  if (el) el.textContent = val;
}

function setStatus(cls, txt) {
  const el = document.getElementById('status-badge');
  el.className = cls;
  el.textContent = txt;
}

function setStat(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

// ── Timer ─────────────────────────────────────────────────────────────────
setInterval(() => {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const sc = String(s % 60).padStart(2, '0');
  document.getElementById('timer').textContent = m + ':' + sc;
}, 500);

// ── Log ───────────────────────────────────────────────────────────────────
function addLog(phase, msg) {
  const scroll = document.getElementById('log-scroll');
  const line = document.createElement('div');
  line.className = 'log-line';

  const now = new Date();
  const ts = String(now.getHours()).padStart(2,'0') + ':' +
             String(now.getMinutes()).padStart(2,'0') + ':' +
             String(now.getSeconds()).padStart(2,'0');

  const timeEl = document.createElement('span');
  timeEl.className = 'log-time';
  timeEl.textContent = ts;

  const phaseEl = document.createElement('span');
  phaseEl.className = 'log-phase phase-' + phase;
  phaseEl.textContent = phase;

  const msgEl = document.createElement('span');
  msgEl.className = 'log-msg';
  msgEl.textContent = msg;

  line.appendChild(timeEl);
  line.appendChild(phaseEl);
  line.appendChild(msgEl);
  scroll.appendChild(line);

  while (scroll.children.length > 200) scroll.removeChild(scroll.firstChild);
  scroll.scrollTop = scroll.scrollHeight;
}

// ── SVG Edges ─────────────────────────────────────────────────────────────
function drawEdges() {
  const svg = document.getElementById('edges');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const pairs = [
    ['node-search', 'node-filter', 'search-filter'],
    ['node-filter', 'node-apply',  'filter-apply'],
    ['node-apply',  'node-record', 'apply-record'],
  ];

  const svgR = svg.getBoundingClientRect();
  for (const [fromId, toId, edgeId] of pairs) {
    const from = document.getElementById(fromId);
    const to   = document.getElementById(toId);
    if (!from || !to) continue;

    const fr = from.getBoundingClientRect();
    const tr = to.getBoundingClientRect();
    const x1 = fr.right  - svgR.left;
    const y1 = fr.top + fr.height / 2 - svgR.top;
    const x2 = tr.left   - svgR.left;
    const y2 = tr.top + tr.height / 2 - svgR.top;
    const cx = (x1 + x2) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + cx + ',' + y1 + ' ' + cx + ',' + y2 + ' ' + x2 + ',' + y2);
    path.setAttribute('id', 'edge-' + edgeId);
    path.setAttribute('class', 'edge ' + (edgeStates[edgeId] || ''));
    svg.appendChild(path);
  }
}

function setEdge(id, st) {
  edgeStates[id] = st;
  const el = document.getElementById('edge-' + id);
  if (el) el.className = 'edge ' + st;
}

window.addEventListener('load', () => setTimeout(drawEdges, 120));
window.addEventListener('resize', drawEdges);
addLog('start', 'Waiting for workflow to start...');
connect();
</script>
</body>
</html>
